# oh-my-agent — project config for Research Planning Workspace

language: ko
timezone: Asia/Seoul
date_format: ISO

# Setup agent preset to claude or mixed
model_preset: mixed

agents:
  pm:
    model: anthropic/claude-3.5-sonnet
  scholar:
    model: anthropic/claude-3.5-sonnet
  academic-writer:
    model: anthropic/claude-3.5-sonnet
    thinking: true
  qa:
    model: google/gemini-2.5-pro

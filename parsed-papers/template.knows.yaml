# [TEMPLATE] 바이오 연구 문헌 메타데이터 사이드카 규격
# 사용방법: 신규 논문/특허 조사 시 이 파일을 복사하여 {paper-id}.knows.yaml 파일로 작성하십시오.

id: "author-year-keyword" # 예: "smith-2026-crispr"
title: "논문 또는 특허의 전체 제목 입력"
authors:
  - "저자명 1 (성, 이름 순)"
  - "저자명 2"
year: 2026 # 발행년도
doi: "DOI 또는 특허 출원번호 입력"
venue: "학술지 이름 또는 특허 출원 처 (예: Nature Biotechnology, USPTO)"

# 바이오 R&D 전용 파라미터 (과제계획서 매핑용)
bio_parameters:
  target_marker: "표적 바커/리셉터/유전자명 입력 (예: HER2, EGFR, Aß42)"
  modality: "치료/진단 모달리티 분류 (예: mAb, CAR-T, siRNA, Small Molecule)"
  animal_model: "전임상에 사용된 동물 모델명 (예: C57BL/6 mouse, Cynomolgus monkey)"
  dosage: "투여 조건 (예: 5 mg/kg, Single/Biweekly, IV/IP)"
  current_trl: 3 # 기술성숙도 단계 (2: 개념정립, 3: In vitro/In vivo 효능 입증, 4: 전임상/독성)
  biocompatibility: "생체 적합성 및 안전성/독성 요약 (예: 체중 감소 없음, 간독성 무)"

key_contributions:
  - "핵심 연구 성과 또는 기여 요소 1"
  - "핵심 연구 성과 또는 기여 요소 2"

claims:
  - claim_id: "C1" # 중복되지 않는 ID 설정 (C1, C2...)
    assertion: "계획서 본문에서 인용해 증빙할 핵심 주장 기술 (예: 후보물질은 마우스 모델에서 종양성장억제율 70% 이상을 나타냄)"
    evidence_type: "실험 구분 (예: In vitro, In vivo, Clinical, FTO Analysis)"
    strength: "증거 강도 (strong | moderate | weak)"
    limitations: "해당 실험데이터의 한계점 또는 후속 연구 필요성 기술"
